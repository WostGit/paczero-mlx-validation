name: PACZero SmolLM validation workflow

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "PACZero-ZPL steps per task"
        required: false
        default: "30"
      train_examples:
        description: "Training examples per task"
        required: false
        default: "8"
      dev_examples:
        description: "Dev examples per task"
        required: false
        default: "8"
      eval_examples:
        description: "Held-out eval examples per task"
        required: false
        default: "32"
      layers:
        description: "Layers to adapt; default all for validation q/v coverage"
        required: false
        default: "all"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/paczero-smollm-validation.yml"
      - "scripts/paczero_mlxlm_faithful_adaptation.py"
      - "scripts/paczero_mlxlm_lora_reproduction.py"
      - "scripts/paczero_core.py"
      - "scripts/paczero_smollm_validation_aggregate.py"
      - "scripts/paczero_zpl_negative_control.py"
      - "scripts/paczero_smollm_nonprivate_utility_control.py"
      - "PACZERO_MLX_ZENODO_RELEASE.md"
      - ".zenodo.json"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  smollm-validation:
    name: SmolLM validation workflow ${{ matrix.task }}
    runs-on: macos-26
    timeout-minutes: 180
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-smollm-validation]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: sst2
            seed: 20260615
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: squad
            seed: 20260616
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '30' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '8' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '8' }}
      EVAL_EXAMPLES: ${{ github.event.inputs.eval_examples || '32' }}
      LAYERS: ${{ github.event.inputs.layers || 'all' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run SmolLM PACZero faithful validation
        run: |
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          mkdir -p "benchmark-logs/paczero-smollm-validation/${slug}" \
                   "benchmark-results/paczero-smollm-validation/${slug}" \
                   "benchmark-results/paczero-smollm-validation-adapters/${slug}"
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-smollm-validation/${slug}/smollm-validation-${stamp}.txt"
          latest_file="benchmark-logs/paczero-smollm-validation/${slug}/smollm-validation-latest.txt"
          result_file="benchmark-results/paczero-smollm-validation/${slug}/smollm_validation_results.json"
          adapter_file="benchmark-results/paczero-smollm-validation-adapters/${slug}/all_layers_qv_lora_rank8_alpha16.npz"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "ADAPTER_FILE=$adapter_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_mlxlm_faithful_adaptation.py \
            --model "${{ matrix.model }}" \
            --slug "${{ matrix.model_slug }}" \
            --task "${{ matrix.task }}" \
            --projections q_proj,v_proj \
            --layers "${LAYERS}" \
            --rank 8 \
            --alpha 16.0 \
            --seed "${{ matrix.seed }}" \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --eval-examples "${EVAL_EXAMPLES}" \
            --num-subsets 126 \
            --mu 0.05 \
            --lr 0.05 \
            --clip 25.0 \
            --eval-every 5 \
            --json-out "$result_file" \
            --adapter-out "$adapter_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add validation summary
        if: always()
        run: |
          echo "# PACZero SmolLM validation audit: ${{ matrix.task }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Model: \`${{ matrix.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Task: \`${{ matrix.task }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Paper-critical settings: \`M=126\`, \`rank=8\`, \`alpha=16\`, \`q_proj+v_proj\`, \`layers=${LAYERS}\`, strict ZPL transcript audit" >> "$GITHUB_STEP_SUMMARY"
          echo "Fast scale: train/dev/eval \`${TRAIN_EXAMPLES}/${DEV_EXAMPLES}/${EVAL_EXAMPLES}\`, steps \`${STEPS}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Adapter file: \`${ADAPTER_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 900 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit SmolLM validation output for ${{ matrix.task }}
        if: always()
        run: |
          set -e
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "benchmark-logs/paczero-smollm-validation/${slug}/" \
                  "benchmark-results/paczero-smollm-validation/${slug}/" \
                  "benchmark-results/paczero-smollm-validation-adapters/${slug}/" || true
          if git diff --cached --quiet; then
            echo "No SmolLM validation output changes to commit for ${slug}."
            exit 0
          fi
          git commit -m "Add SmolLM PACZero validation output for ${slug} [skip ci] [skip paczero-smollm-validation]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed SmolLM validation output for ${slug} on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed for ${slug}; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-smollm-validation-${{ matrix.task }}
          path: |
            benchmark-logs/paczero-smollm-validation/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-validation/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-validation-adapters/${{ matrix.model_slug }}-${{ matrix.task }}
          if-no-files-found: warn

  smollm-nonprivate-utility-control:
    name: SmolLM non-private utility control ${{ matrix.task }}
    runs-on: macos-26
    timeout-minutes: 180
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-smollm-validation]') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: sst2
            seed: 20260618
          - model_slug: smollm-135m-4bit
            model: mlx-community/SmolLM-135M-4bit
            task: squad
            seed: 20260619
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONWARNINGS: "ignore"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
      HF_XET_HIGH_PERFORMANCE: "1"
      STEPS: ${{ github.event.inputs.steps || '30' }}
      TRAIN_EXAMPLES: ${{ github.event.inputs.train_examples || '8' }}
      DEV_EXAMPLES: ${{ github.event.inputs.dev_examples || '8' }}
      EVAL_EXAMPLES: ${{ github.event.inputs.eval_examples || '32' }}
      LAYERS: ${{ github.event.inputs.layers || 'all' }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX-LM dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub hf_transfer safetensors numpy datasets

      - name: Run non-private ZO utility control
        run: |
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          mkdir -p "benchmark-logs/paczero-smollm-utility-control/${slug}" \
                   "benchmark-results/paczero-smollm-utility-control/${slug}" \
                   "benchmark-results/paczero-smollm-utility-control-adapters/${slug}"
          stamp="$(date -u '+%Y%m%dT%H%M%SZ')"
          log_file="benchmark-logs/paczero-smollm-utility-control/${slug}/nonprivate-utility-control-${stamp}.txt"
          latest_file="benchmark-logs/paczero-smollm-utility-control/${slug}/nonprivate-utility-control-latest.txt"
          result_file="benchmark-results/paczero-smollm-utility-control/${slug}/nonprivate_utility_control_results.json"
          adapter_file="benchmark-results/paczero-smollm-utility-control-adapters/${slug}/nonprivate_all_layers_qv_lora_rank8_alpha16.npz"
          echo "LOG_FILE=$log_file" >> "$GITHUB_ENV"
          echo "LATEST_FILE=$latest_file" >> "$GITHUB_ENV"
          echo "RESULT_FILE=$result_file" >> "$GITHUB_ENV"
          echo "ADAPTER_FILE=$adapter_file" >> "$GITHUB_ENV"
          set -o pipefail
          python scripts/paczero_smollm_nonprivate_utility_control.py \
            --model "${{ matrix.model }}" \
            --slug "${{ matrix.model_slug }}" \
            --task "${{ matrix.task }}" \
            --projections q_proj,v_proj \
            --layers "${LAYERS}" \
            --rank 8 \
            --alpha 16.0 \
            --seed "${{ matrix.seed }}" \
            --steps "${STEPS}" \
            --train-examples "${TRAIN_EXAMPLES}" \
            --dev-examples "${DEV_EXAMPLES}" \
            --eval-examples "${EVAL_EXAMPLES}" \
            --mu 0.05 \
            --lr 0.05 \
            --eval-every 5 \
            --json-out "$result_file" \
            --adapter-out "$adapter_file" \
            2>&1 | tee "$log_file"
          cp "$log_file" "$latest_file"

      - name: Add utility control summary
        if: always()
        run: |
          echo "# PACZero SmolLM non-private utility control: ${{ matrix.task }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Model: \`${{ matrix.model }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Task: \`${{ matrix.task }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "This control is not private; it checks smoke-scale utility against the frozen baseline." >> "$GITHUB_STEP_SUMMARY"
          echo "Log: \`${LATEST_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Result JSON: \`${RESULT_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Adapter file: \`${ADAPTER_FILE:-not-created}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "${LOG_FILE:-}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 700 "$LOG_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit utility control output for ${{ matrix.task }}
        if: always()
        run: |
          set -e
          slug="${{ matrix.model_slug }}-${{ matrix.task }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "benchmark-logs/paczero-smollm-utility-control/${slug}/" \
                  "benchmark-results/paczero-smollm-utility-control/${slug}/" \
                  "benchmark-results/paczero-smollm-utility-control-adapters/${slug}/" || true
          if git diff --cached --quiet; then
            echo "No utility-control output changes to commit for ${slug}."
            exit 0
          fi
          git commit -m "Add SmolLM PACZero utility control output for ${slug} [skip ci] [skip paczero-smollm-validation]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed utility-control output for ${slug} on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed for ${slug}; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-smollm-utility-control-${{ matrix.task }}
          path: |
            benchmark-logs/paczero-smollm-utility-control/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-utility-control/${{ matrix.model_slug }}-${{ matrix.task }}
            benchmark-results/paczero-smollm-utility-control-adapters/${{ matrix.model_slug }}-${{ matrix.task }}
          if-no-files-found: warn

  aggregate-smollm-validation:
    name: Aggregate SmolLM validation workflow
    needs: [smollm-validation, smollm-nonprivate-utility-control]
    runs-on: ubuntu-latest
    if: always() && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip paczero-smollm-validation]'))
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Pull committed task outputs
        run: |
          git pull --rebase --autostash origin main

      - name: Run ZPL negative-control privacy audit
        run: |
          python scripts/paczero_zpl_negative_control.py

      - name: Aggregate ZPL, utility-control, and negative-control validation results
        run: |
          python scripts/paczero_smollm_validation_aggregate.py

      - name: Add aggregate validation report to summary
        if: always()
        run: |
          echo "# Aggregate PACZero SmolLM validation report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f benchmark-results/paczero-smollm-validation-aggregate/smollm_validation_report.md ]; then
            cat benchmark-results/paczero-smollm-validation-aggregate/smollm_validation_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Aggregate report was not created." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit aggregate SmolLM validation report
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add benchmark-results/paczero-smollm-validation-aggregate/ || true
          if git diff --cached --quiet; then
            echo "No aggregate SmolLM report changes to commit."
            exit 0
          fi
          git commit -m "Add aggregate SmolLM PACZero validation validation report [skip ci] [skip paczero-smollm-validation]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed aggregate SmolLM report on attempt ${attempt}."
              exit 0
            fi
            echo "Push failed for aggregate report; rebasing and retrying attempt ${attempt}..."
            git pull --rebase --autostash origin main
          done
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: paczero-smollm-validation-aggregate
          path: benchmark-results/paczero-smollm-validation-aggregate
          if-no-files-found: warn
