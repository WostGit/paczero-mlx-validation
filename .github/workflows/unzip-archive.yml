name: Unpack archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    name: Replace repository with archive contents
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.REPO_PUSH_TOKEN || github.token }}

      - name: Locate and validate archive
        run: |
          set -euo pipefail
          echo "Repository files:"
          find . -maxdepth 4 -type f | sort
          if [ -f archive/mlx-finetune-main-subtle.zip ]; then
            cp archive/mlx-finetune-main-subtle.zip archive.zip
          elif [ -f mlx-finetune-main-subtle.zip ]; then
            cp mlx-finetune-main-subtle.zip archive.zip
          elif [ -f archive/mlx-finetune-main-cleaned.zip ]; then
            cp archive/mlx-finetune-main-cleaned.zip archive.zip
          elif [ -f mlx-finetune-main-cleaned.zip ]; then
            cp mlx-finetune-main-cleaned.zip archive.zip
          else
            echo "No expected zip found. Put mlx-finetune-main-subtle.zip at repo root or archive/." >&2
            exit 1
          fi
          unzip -t archive.zip

      - name: Replace repository root with archive contents
        run: |
          set -euo pipefail
          extract_dir="$RUNNER_TEMP/archive_extract"
          source_dir="$RUNNER_TEMP/archive_source"
          rm -rf "$extract_dir" "$source_dir"
          mkdir -p "$extract_dir" "$source_dir"
          unzip -q archive.zip -d "$extract_dir"

          top_level_count=$(find "$extract_dir" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')
          top_level_dir=$(find "$extract_dir" -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)

          if [ "$top_level_count" = "1" ] && [ -n "$top_level_dir" ]; then
            echo "Archive has one top-level folder; using its contents as repository root."
            rsync -a "$top_level_dir"/ "$source_dir"/
          else
            echo "Archive has root-level contents; using them directly."
            rsync -a "$extract_dir"/ "$source_dir"/
          fi

          echo "Replacement root preview:"
          find "$source_dir" -maxdepth 3 -type f | sort | sed -n '1,120p'

          rsync -a --delete --exclude='.git/' "$source_dir"/ ./
          rm -f archive.zip

      - name: Commit replacement contents
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No replacement changes to commit."
            exit 0
          fi
          git commit -m "Replace repository with unpacked archive"
          git push
