name: Unpack archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    name: Locate, unpack, and commit archive
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Locate and validate archive
        run: |
          set -euo pipefail
          echo "Repository files:"
          find . -maxdepth 4 -type f | sort
          if [ -f archive/mlx-finetune-main-subtle.zip ]; then
            cp archive/mlx-finetune-main-subtle.zip archive.zip
          elif [ -f mlx-finetune-main-subtle.zip ]; then
            cp mlx-finetune-main-subtle.zip archive.zip
          elif [ -f archive/mlx-finetune-main-cleaned.zip ]; then
            cp archive/mlx-finetune-main-cleaned.zip archive.zip
          elif [ -f mlx-finetune-main-cleaned.zip ]; then
            cp mlx-finetune-main-cleaned.zip archive.zip
          else
            echo "No expected zip found. Put mlx-finetune-main-subtle.zip at repo root or archive/." >&2
            exit 1
          fi
          unzip -t archive.zip

      - name: Unpack archive into repository root
        run: |
          set -euo pipefail
          rm -rf unpacked
          mkdir -p unpacked
          unzip -q archive.zip -d unpacked
          find unpacked -maxdepth 3 -type f | sort | sed -n '1,120p'
          rsync -a unpacked/ ./
          rm -rf unpacked archive.zip

      - name: Commit unpacked contents
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No unpacked changes to commit."
            exit 0
          fi
          git commit -m "Unpack packaged archive"
          git push
