name: Unpack archive

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unzip:
    name: Reconstruct and unpack archive
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Locate archive
        run: |
          set -euo pipefail
          test -f archive/mlx-finetune-main-subtle.zip
          unzip -t archive/mlx-finetune-main-subtle.zip

      - name: Unpack archive
        run: |
          set -euo pipefail
          rm -rf unpacked
          mkdir -p unpacked
          unzip -q archive/mlx-finetune-main-subtle.zip -d unpacked
          find unpacked -maxdepth 3 -type f | sort | sed -n '1,120p'

      - name: Upload unpacked archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: unpacked-archive
          path: unpacked/
